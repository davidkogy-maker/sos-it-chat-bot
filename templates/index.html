<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOŠ IT Ostrovského – AI Sprievodca</title>

  <style>
    :root{
      --bg: rgba(255,255,255,0.92);
      --panel: #ffffff;
      --header: #0b5bd3;
      --text: #111827;
      --muted: #6b7280;
      --bubble-ai: #f3f4f6;
      --bubble-user: #0b5bd3;
      --border: rgba(0,0,0,0.08);
      --shadow: 0 10px 30px rgba(0,0,0,0.12);
      --focus: 0 0 0 3px rgba(11,91,211,0.20);
    }

    /* Dôležité pre 3DVista/webframe: nech je stránka NA CELOM priestore */
    html, body {
      height: 100%;
      width: 100%;
      margin: 0;
      padding: 0;
      background: transparent; /* nech sa nebijeme s pozadím 3D */
      overflow: hidden; /* scroll nech je len vo vnútri chat okna */
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
    }

    /* Root kontajner */
    .app {
      height: 100%;
      width: 100%;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
      background: transparent;
    }

    /* Chat shell je “na celé” – žiadny max-width */
    .chat-shell {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);

      /* “kockované” */
      border-radius: 0;
      overflow: hidden;
    }

    /* Header */
    .chat-header {
      flex: 0 0 auto;
      background: var(--header);
      color: white;
      font-weight: 700;
      text-align: center;
      padding: 14px 12px;
      letter-spacing: 0.2px;
      user-select: none;
    }

    /* Obsah */
    .chat-body {
      flex: 1 1 auto;
      min-height: 0; /* extrémne dôležité pre scroll vo flexe */
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
    }

    /* Správy scrollujú samé */
    .messages {
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding: 8px;
      background: rgba(255,255,255,0.55);
      border: 1px solid var(--border);

      /* “kockované” */
      border-radius: 0;
    }

    .msg {
      display: flex;
      margin: 10px 0;
    }

    .msg.ai { justify-content: flex-start; }
    .msg.user { justify-content: flex-end; }

    .bubble {
      max-width: min(820px, 92%);
      padding: 12px 14px;
      line-height: 1.35;
      font-size: 15px;
      border: 1px solid var(--border);
      white-space: pre-wrap;
      word-break: break-word;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);

      /* bubliny môžu byť jemne zaoblené, ale ak chceš úplne kocky, daj 0 */
      border-radius: 12px;
    }

    .msg.ai .bubble {
      background: var(--bubble-ai);
      color: var(--text);
    }

    .msg.user .bubble {
      background: var(--bubble-user);
      color: white;
      border-color: rgba(255,255,255,0.15);
    }

    /* Spodný input bar */
    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 10px;
      padding: 12px;
      background: rgba(255,255,255,0.75);
      border-top: 1px solid var(--border);
    }

    .composer input {
      flex: 1 1 auto;
      height: 44px;
      padding: 0 14px;
      font-size: 15px;
      border: 1px solid var(--border);
      outline: none;

      /* kocka */
      border-radius: 0;
      background: white;
    }

    .composer input:focus {
      box-shadow: var(--focus);
      border-color: rgba(11,91,211,0.45);
    }

    .composer button {
      flex: 0 0 auto;
      height: 44px;
      padding: 0 18px;
      font-weight: 700;
      font-size: 15px;
      color: white;
      background: var(--header);
      border: 1px solid rgba(0,0,0,0.05);
      cursor: pointer;

      /* kocka */
      border-radius: 0;
    }

    .composer button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      padding: 0 2px 2px 2px;
    }

    /* Keď je webframe veľmi úzky */
    @media (max-width: 420px){
      .bubble { font-size: 14px; }
      .chat-header { padding: 12px 10px; }
      .composer { padding: 10px; }
    }

    /* Ak chceš úplne “kockové” aj bubliny, odkomentuj:
    .bubble { border-radius: 0; }
    */
  </style>
</head>

<body>
  <div class="app">
    <div class="chat-shell" role="application" aria-label="SOŠ IT chat">
      <div class="chat-header">SOŠ IT Ostrovského – AI Sprievodca</div>

      <div class="chat-body">
        <div class="messages" id="messages" aria-live="polite" aria-relevant="additions">
          <div class="msg ai">
            <div class="bubble">
Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 😊
            </div>
          </div>
        </div>

        <div class="hint" id="hint"></div>
      </div>

      <form class="composer" id="form" autocomplete="off">
        <input
          id="input"
          type="text"
          placeholder="Napíšte otázku..."
          maxlength="800"
        />
        <button id="send" type="submit">Odoslať</button>
      </form>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById("messages");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const hintEl = document.getElementById("hint");

    function addMessage(text, who) {
      const row = document.createElement("div");
      row.className = `msg ${who}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);

      // scroll dolu
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setBusy(isBusy, hintText = "") {
      sendBtn.disabled = isBusy;
      input.disabled = isBusy;
      hintEl.textContent = hintText;
    }

    async function sendMessage(text) {
      // tu vieš upraviť, ak máš iný endpoint
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      // ak server vráti 429/503, zobrazíme “veľa ľudí” (bez spomínania limitov)
      if (!res.ok) {
        let seconds = 12; // default
        const retryAfter = res.headers.get("Retry-After");
        if (retryAfter) {
          const n = parseInt(retryAfter, 10);
          if (!Number.isNaN(n) && n > 0 && n < 120) seconds = n;
        }
        return { reply: `Momentálne je veľa ľudí naraz. Skús to prosím o ${seconds} sekúnd.` };
      }

      const data = await res.json();

      // Uprav podľa toho, čo vracia backend:
      // napr. data.reply / data.response / data.text ...
      return { reply: (data.reply ?? data.response ?? data.text ?? "").toString() };
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      addMessage(text, "user");
      input.value = "";

      setBusy(true, "");
      try {
        const { reply } = await sendMessage(text);
        addMessage(reply || "Prepáč, niečo sa pokazilo. Skús to prosím znova.", "ai");
      } catch (err) {
        addMessage("Momentálne je veľa ľudí naraz. Skús to prosím o pár sekúnd.", "ai");
      } finally {
        setBusy(false, "");
        input.focus();
      }
    });

    // Enter posiela, Shift+Enter nie (keď je input typu text, je to default OK)
    window.addEventListener("load", () => input.focus());
  </script>
</body>
</html>
