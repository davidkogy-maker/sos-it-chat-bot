<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOŠ IT AI Chat</title>

<style>
html, body{
  margin:0;
  padding:0;
  height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Segoe UI', Arial, sans-serif;
}

/* Center panel in 3D frame */
.wrapper{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Chat panel */
.chat-container{
  width:min(520px, 95%);
  height:92vh;
  display:flex;
  flex-direction:column;

  background:rgba(255,255,255,0.78);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  border-radius:22px;
  overflow:hidden;

  box-shadow:0 25px 60px rgba(0,0,0,0.35);
}

/* Header with close button */
.header{
  position:relative;
  background:linear-gradient(135deg, #0a57c7, #1c7df0);
  color:#fff;
  padding:14px 46px 14px 14px; /* right padding for X */
  text-align:center;
  font-weight:600;
  font-size:15px;
}

/* Our close X */
.close-btn{
  position:absolute;
  top:50%;
  right:12px;
  transform:translateY(-50%);
  width:32px;
  height:32px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.35);
  background:rgba(255,255,255,0.18);
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  line-height:1;
  user-select:none;
}

.close-btn:hover{ background:rgba(255,255,255,0.28); }
.close-btn:active{ transform:translateY(-50%) scale(0.98); }

/* Messages */
#messages{
  flex:1;
  overflow-y:auto;
  padding:18px;
}

.msg{
  max-width:85%;
  padding:12px 15px;
  margin:8px 0;
  border-radius:16px;
  line-height:1.45;
  font-size:14px;
  animation:fadeIn 0.25s ease;
  word-wrap:break-word;
}

.msg.user{
  margin-left:auto;
  background:#0a57c7;
  color:#fff;
  border-bottom-right-radius:6px;
}

.msg.bot{
  margin-right:auto;
  background:rgba(240,240,240,0.95);
  color:#111;
  border-bottom-left-radius:6px;
}

/* Input */
.input-row{
  display:flex;
  gap:10px;
  padding:14px;
  background:rgba(255,255,255,0.85);
  border-top:1px solid rgba(0,0,0,0.05);
}

#user-input{
  flex:1;
  padding:12px 14px;
  border:1px solid #ddd;
  border-radius:25px;
  outline:none;
  font-size:14px;
}

button.send{
  background:#0a57c7;
  color:#fff;
  border:none;
  padding:12px 16px;
  border-radius:25px;
  cursor:pointer;
  font-weight:600;
}

button.send:hover{ background:#084bb0; }
button.send:disabled{ opacity:0.6; cursor:not-allowed; }

/* Scrollbar */
#messages::-webkit-scrollbar{ width:6px; }
#messages::-webkit-scrollbar-thumb{
  background:rgba(0,0,0,0.2);
  border-radius:6px;
}

@keyframes fadeIn{
  from{ opacity:0; transform:translateY(5px); }
  to{ opacity:1; transform:translateY(0); }
}

/* Soft-hidden state (fallback) */
.hidden{ display:none !important; }

/* Mini bubble (re-open) */
.bubble{
  position:fixed;
  right:16px;
  bottom:16px;
  width:56px;
  height:56px;
  border-radius:18px;
  background:linear-gradient(135deg, #0a57c7, #1c7df0);
  box-shadow:0 18px 40px rgba(0,0,0,0.35);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  font-size:22px;
  border:1px solid rgba(255,255,255,0.35);
}
.bubble:hover{ filter:brightness(1.05); }
.bubble:active{ transform:scale(0.98); }

.bubble::after{
  content:"Chat";
  position:absolute;
  right:68px;
  bottom:16px;
  background:rgba(0,0,0,0.75);
  color:#fff;
  padding:6px 10px;
  border-radius:10px;
  font-size:12px;
  opacity:0;
  pointer-events:none;
  transform:translateX(6px);
  transition:all 0.18s ease;
  white-space:nowrap;
}
.bubble:hover::after{
  opacity:1;
  transform:translateX(0);
}
</style>
</head>

<body>
  <div class="wrapper" id="wrapper">
    <div class="chat-container" id="chatPanel">
      <div class="header">
        SOŠ IT Ostrovského – AI Sprievodca
        <div class="close-btn" id="closeBtn" title="Zavrieť">×</div>
      </div>

      <div id="messages"></div>

      <div class="input-row">
        <input id="user-input" type="text" placeholder="Napíšte otázku..."
               onkeydown="if(event.key==='Enter'){sendMessage();}">
        <button class="send" id="send-btn" onclick="sendMessage()">Odoslať</button>
      </div>
    </div>
  </div>

  <!-- Reopen bubble (fallback if hard-close not possible) -->
  <div class="bubble hidden" id="bubble" title="Otvoriť chat">💬</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const history = [];

const chatPanel = document.getElementById('chatPanel');
const bubble = document.getElementById('bubble');
const closeBtn = document.getElementById('closeBtn');

appendMessage("Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 🙂", "bot");

/**
 * Tries to "hard close" the WebFrame (if parent supports it).
 * Always falls back to hiding our UI if parent doesn't support closing.
 */
function tryHardClose() {
  // 1) Soft close ALWAYS (so user instantly sees it closed)
  chatPanel.classList.add("hidden");
  bubble.classList.remove("hidden");

  // 2) Try common postMessage patterns (platform-specific listeners may exist)
  const msgs = [
    { type: "close" },
    { type: "close-webframe" },
    { action: "close" },
    { action: "closeWebFrame" },
    { name: "close" },
    "close",
    "close-webframe",
    "closeWebFrame"
  ];

  try {
    msgs.forEach(m => window.parent?.postMessage(m, "*"));
  } catch(e) {}

  // 3) Try calling possible parent functions (only works if exposed)
  // NOTE: these are safe to try; they won't crash if missing.
  try { window.parent?.closeWebFrame?.(); } catch(e) {}
  try { window.parent?.closeIframe?.(); } catch(e) {}
  try { window.parent?.closeModal?.(); } catch(e) {}
  try { window.parent?.hideWebFrame?.(); } catch(e) {}
  try { window.parent?.WebFrame?.close?.(); } catch(e) {}
  try { window.parent?.webframe?.close?.(); } catch(e) {}

  // 4) Try navigating away inside iframe (some platforms auto-close empty iframes)
  // Usually not needed; keep it mild.
  // try { window.location.href = "about:blank"; } catch(e) {}

  // 5) window.close() only works for popups; still try (harmless)
  try { window.close(); } catch(e) {}
}

closeBtn.addEventListener("click", tryHardClose);

bubble.addEventListener("click", () => {
  bubble.classList.add("hidden");
  chatPanel.classList.remove("hidden");
  inputEl.focus();
});

function escapeHtml(str){
  return str
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function formatMessage(text){
  let t = escapeHtml(text);
  t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  t = t.replaceAll("\n","<br>");
  return t;
}

function appendMessage(text, side){
  const div = document.createElement('div');
  div.className = `msg ${side}`;
  div.innerHTML = formatMessage(text);
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;

  appendMessage(text, "user");
  history.push({ role:"user", text });

  inputEl.value = "";
  sendBtn.disabled = true;

  const loading = document.createElement('div');
  loading.className = "msg bot";
  loading.id = "loading";
  loading.innerText = "AI premýšľa...";
  messagesEl.appendChild(loading);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try{
    const response = await fetch("/chat", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ message:text, history })
    });

    document.getElementById("loading")?.remove();
    const data = await response.json();

    const botReply = data.response || "Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.";
    appendMessage(botReply, "bot");
    history.push({ role:"model", text: botReply });

  }catch(e){
    document.getElementById("loading")?.remove();
    appendMessage("Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.", "bot");
  }finally{
    sendBtn.disabled = false;
    inputEl.focus();
  }
}
</script>
</body>
</html>
