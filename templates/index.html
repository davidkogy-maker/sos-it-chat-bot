<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOŠ IT Ostrovského - AI Sprievodca</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; margin:0; }
    .chat-container { width: 380px; max-width: 95vw; margin: 20px auto; background:#fff; border-radius:16px; overflow:hidden; box-shadow:0 6px 20px rgba(0,0,0,.12); }
    .header { background:#0a57c7; color:#fff; padding:16px; text-align:center; font-weight:700; }
    #messages { height: 520px; overflow-y:auto; padding:16px; background:#ffffff; }
    .msg { max-width: 85%; padding:12px 14px; margin:10px 0; border-radius:14px; line-height:1.35; white-space: normal; word-wrap: break-word; }
    .msg.user { margin-left:auto; background:#0a57c7; color:#fff; border-bottom-right-radius:6px; }
    .msg.bot { margin-right:auto; background:#eef1f5; color:#111; border-bottom-left-radius:6px; }
    .input-row { display:flex; gap:10px; padding:14px; border-top:1px solid #e6e6e6; background:#fff; }
    #user-input { flex:1; padding:12px 14px; border:1px solid #dcdcdc; border-radius:22px; outline:none; }
    button { background:#0a57c7; color:#fff; border:none; padding:12px 16px; border-radius:22px; cursor:pointer; font-weight:600; }
    button:disabled { opacity:0.7; cursor:not-allowed; }
    .loading { opacity:0.85; font-style:italic; }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">SOŠ IT Ostrovského - AI Sprievodca</div>
    <div id="messages"></div>
    <div class="input-row">
      <input id="user-input" type="text" placeholder="Napíšte otázku..." onkeydown="if(event.key==='Enter'){sendMessage();}" />
      <button id="send-btn" onclick="sendMessage()">Odoslať</button>
    </div>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');

  // História pre kontext
  const history = [];

  appendMessage("Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 🙂", "bot");

  function escapeHtml(str) {
    return str
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  // **bold** + nové riadky
  function formatMessage(text) {
    let t = escapeHtml(text);
    t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    t = t.replaceAll("\n", "<br>");
    return t;
  }

  function appendMessage(text, side) {
    const div = document.createElement('div');
    div.className = `msg ${side}`;
    div.innerHTML = formatMessage(text);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    history.push({ role: "user", text });

    inputEl.value = "";
    sendBtn.disabled = true;

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'msg bot loading';
    loadingDiv.innerText = 'AI premýšľa...';
    loadingDiv.id = 'temp-loading';
    messagesEl.appendChild(loadingDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000);

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: controller.signal,
        body: JSON.stringify({ message: text, history })
      });

      clearTimeout(timeout);
      document.getElementById('temp-loading')?.remove();

      let data;
      try {
        data = await response.json();
      } catch {
        appendMessage("Server je momentálne vyťažený. Skús to prosím znova.", "bot");
        return;
      }

      const botText = (data && data.response) ? data.response : "Server vrátil neplatné dáta.";
      appendMessage(botText, "bot");
      history.push({ role: "model", text: botText });

    } catch (error) {
      document.getElementById('temp-loading')?.remove();
      if (error.name === "AbortError") {
        appendMessage("Odpoveď trvala príliš dlho. Skús to prosím znova.", "bot");
      } else {
        appendMessage("Chyba pripojenia. Skús to prosím znova.", "bot");
      }
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>
</body>
</html>
