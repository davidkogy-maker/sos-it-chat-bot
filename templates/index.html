<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOŠ IT AI Chat</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Segoe UI', Arial, sans-serif;
}

/* Center panel in 3D frame */
.wrapper {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Chat panel */
.chat-container {
    width: min(520px, 95%);
    height: 92vh;
    display: flex;
    flex-direction: column;

    background: rgba(255, 255, 255, 0.78);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);

    border-radius: 22px;
    overflow: hidden;

    box-shadow: 0 25px 60px rgba(0,0,0,0.35);
}

/* Header */
.header {
    background: linear-gradient(135deg, #0a57c7, #1c7df0);
    color: white;
    padding: 14px;
    text-align: center;
    font-weight: 600;
    font-size: 15px;
}

/* Messages area */
#messages {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
}

/* Message bubbles */
.msg {
    max-width: 85%;
    padding: 12px 15px;
    margin: 8px 0;
    border-radius: 16px;
    line-height: 1.45;
    font-size: 14px;
    animation: fadeIn 0.25s ease;
}

.msg.user {
    margin-left: auto;
    background: #0a57c7;
    color: white;
    border-bottom-right-radius: 6px;
}

.msg.bot {
    margin-right: auto;
    background: rgba(240,240,240,0.95);
    color: #111;
    border-bottom-left-radius: 6px;
}

/* Input area */
.input-row {
    display: flex;
    gap: 10px;
    padding: 14px;
    background: rgba(255,255,255,0.85);
    border-top: 1px solid rgba(0,0,0,0.05);
}

#user-input {
    flex: 1;
    padding: 12px 14px;
    border: 1px solid #ddd;
    border-radius: 25px;
    outline: none;
    font-size: 14px;
}

button {
    background: #0a57c7;
    color: white;
    border: none;
    padding: 12px 16px;
    border-radius: 25px;
    cursor: pointer;
    font-weight: 600;
}

button:hover {
    background: #084bb0;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Scrollbar */
#messages::-webkit-scrollbar {
    width: 6px;
}
#messages::-webkit-scrollbar-thumb {
    background: rgba(0,0,0,0.2);
    border-radius: 6px;
}

/* Animation */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div class="wrapper">
<div class="chat-container">

    <div class="header">
        SOŠ IT Ostrovského – AI Sprievodca
    </div>

    <div id="messages"></div>

    <div class="input-row">
        <input id="user-input" type="text"
               placeholder="Napíšte otázku..."
               onkeydown="if(event.key==='Enter'){sendMessage();}">
        <button id="send-btn" onclick="sendMessage()">Odoslať</button>
    </div>

</div>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
const history = [];

appendMessage("Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 🙂", "bot");

function escapeHtml(str) {
    return str
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
}

function formatMessage(text) {
    let t = escapeHtml(text);
    t = t.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>");
    t = t.replaceAll("\n","<br>");
    return t;
}

function appendMessage(text, side) {
    const div = document.createElement('div');
    div.className = `msg ${side}`;
    div.innerHTML = formatMessage(text);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    history.push({role:"user", text});

    inputEl.value = "";
    sendBtn.disabled = true;

    const loading = document.createElement('div');
    loading.className = "msg bot";
    loading.innerText = "AI premýšľa...";
    loading.id = "loading";
    messagesEl.appendChild(loading);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({message:text, history})
        });

        document.getElementById("loading")?.remove();
        const data = await response.json();

        const botReply = data.response || "Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.";
        appendMessage(botReply,"bot");
        history.push({role:"model", text:botReply});

    } catch (err) {
        document.getElementById("loading")?.remove();
        appendMessage("Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.","bot");
    }

    sendBtn.disabled = false;
    inputEl.focus();
}
</script>

</body>
</html>
