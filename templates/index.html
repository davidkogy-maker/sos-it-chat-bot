<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOŠ IT Ostrovského – AI Sprievodca</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <style>
    :root{
      --primary:#03A4E2;
      --primary-dark:#0289bd;
      --border:#d9d9d9;
      --bg:#efefef;
      --bot:#e9ecef;
      --text:#1f2937;
      --white:#ffffff;
      --chip-bg:#ffffff;
      --chip-border:#cfd8df;
    }

    *{box-sizing:border-box;margin:0;padding:0;}

    html, body{
      width:100%;
      height:100%;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .header{
      background:var(--primary);
      color:white;
      text-align:center;
      padding:22px 16px;
      font-size:18px;
      font-weight:700;
      position:sticky;
      top:0;
    }

    .chat-wrap{
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:20px 16px 18px;
    }

    .row{
      display:flex;
      margin:14px 0;
      width:100%;
    }

    .row.user{justify-content:flex-end;}
    .row.bot{justify-content:flex-start;}
    .row.bot.welcome{justify-content:center;}

    .bubble{
      max-width:min(78%, 1100px);
      padding:18px 22px;
      border-radius:18px;
      border:1px solid var(--border);
      line-height:1.6;
      font-size:17px;
    }

    .row.bot .bubble{
      background:var(--bot);
    }

    .row.user .bubble{
      background:var(--primary);
      color:white;
      border:none;
    }

    .row.bot.welcome .bubble{
      max-width:min(92%, 720px);
    }

    .quick-questions-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:10px 16px 14px;
    }

    .quick-title{
      width:100%;
      max-width:760px;
      font-size:14px;
      margin-bottom:10px;
      font-weight:600;
      color:#555;
    }

    .quick-questions{
      width:100%;
      max-width:760px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .quick-btn{
      border:1px solid var(--chip-border);
      background:white;
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-size:14px;
    }

    .quick-btn:hover{
      border-color:var(--primary);
      color:var(--primary);
    }

    .composer{
      display:flex;
      gap:12px;
      padding:14px;
      border-top:1px solid #ddd;
      background:#f7f7f7;
    }

    .composer input{
      flex:1;
      padding:14px;
      font-size:16px;
      border:1px solid #ccc;
    }

    .composer button{
      background:var(--primary);
      color:white;
      border:none;
      padding:0 20px;
      font-weight:700;
      cursor:pointer;
    }

    .typing{
      display:flex;
      gap:5px;
    }

    .dot{
      width:8px;
      height:8px;
      background:#999;
      border-radius:50%;
      animation:blink 1s infinite;
    }

    @keyframes blink{
      0%{opacity:.3}
      50%{opacity:1}
      100%{opacity:.3}
    }
  </style>
</head>

<body>

<div class="header">SOŠ IT Ostrovského – AI Sprievodca</div>

<div class="chat-wrap">
  <div class="messages" id="messages"></div>

  <div class="quick-questions-wrap">
    <div class="quick-title">Skús sa opýtať napríklad:</div>
    <div class="quick-questions">
      <button class="quick-btn" data-q="Aké sú odbory?">Aké sú odbory?</button>
      <button class="quick-btn" data-q="Ako prebiehajú prijímačky?">Prijímačky</button>
      <button class="quick-btn" data-q="Kde nájdem jedálny lístok?">Jedálny lístok</button>
      <button class="quick-btn" data-q="Ako sa prihlásim na EduPage?">EduPage</button>
      <button class="quick-btn" data-q="Aké sú kontakty?">Kontakty</button>
    </div>
  </div>

  <div class="composer">
    <input id="input" placeholder="Napíšte otázku...">
    <button onclick="sendMessage()">Odoslať</button>
  </div>
</div>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("input");

let history = [];

function addMessage(role, text, typing=false, welcome=false){
  const row = document.createElement("div");
  row.className = `row ${role}` + (welcome ? " welcome" : "");

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if(typing){
    bubble.innerHTML = `<div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
  } else {
    bubble.innerHTML = DOMPurify.sanitize(marked.parse(text));
  }

  row.appendChild(bubble);
  messages.appendChild(row);
  messages.scrollTop = messages.scrollHeight;

  return bubble;
}

async function sendMessage(custom=null){
  const text = custom || input.value.trim();
  if(!text) return;

  addMessage("user", text);
  history.push({role:"user", text});
  input.value="";

  const typing = addMessage("bot","",true);

  try{
    const res = await fetch("/chat",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:text,history})
    });

    const data = await res.json();
    typing.innerHTML = DOMPurify.sanitize(marked.parse(data.response));
    history.push({role:"model", text:data.response});

  }catch{
    typing.innerHTML="Chyba spojenia.";
  }
}

document.querySelectorAll(".quick-btn").forEach(btn=>{
  btn.onclick = ()=>sendMessage(btn.dataset.q);
});

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMessage();
});

addMessage("bot",`Som AI sprievodca **SOŠ IT Ostrovského** 🙂

Môžeš sa ma opýtať napríklad:
- **aké sú odbory**
- **ako prebiehajú prijímačky**
- **kde nájdeš informácie na EduPage**
- **aké sú kontakty**

Rád ti pomôžem 🙂`,false,true);
</script>

</body>
</html>
