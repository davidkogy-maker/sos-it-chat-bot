<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOŠ IT Ostrovského – AI Sprievodca</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

<style>
:root{
  --primary:#03A4E2;
  --primary-dark:#0289bd;
  --border:#e6e6e6;
  --soft:#f4f6f8;
  --text:#1f2a37;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

html,body{
  height:100%;
  width:100%;
  font-family:Arial,Helvetica,sans-serif;
  background:transparent;
}

.page{
  width:100vw;
  height:100vh;
}

.chat{
  width:100vw;
  height:100vh;
  display:flex;
  flex-direction:column;
  background:#fff;
}

.header{
  position:sticky;
  top:0;
  background:#03A4E2;
  color:#fff;
  font-weight:bold;
  text-align:center;
  padding:18px;
  font-size:18px;
  z-index:10;
}

.messages{
  flex:1;
  overflow-y:auto;
  padding:20px;
  background:#ffffff;
}

.row{
  display:flex;
  margin:10px 0;
}

.row.user{
  justify-content:flex-end;
}

.row.bot{
  justify-content:flex-start;
}

.bubble{
  max-width:80%;
  padding:12px 16px;
  border-radius:12px;
  border:1px solid var(--border);
  background:var(--soft);
  font-size:15px;
  line-height:1.4;
  color:var(--text);
}

.row.user .bubble{
  background:#03A4E2;
  color:white;
  border:none;
}

.bubble p{
  margin-bottom:10px;
}

.bubble ul{
  margin-left:20px;
}

.bubble strong{
  font-weight:bold;
}

.composer{
  display:flex;
  gap:10px;
  padding:16px;
  border-top:1px solid var(--border);
  background:#fff;
}

.composer input{
  flex:1;
  padding:12px;
  font-size:16px;
  border:1px solid #ccc;
  outline:none;
}

.composer input:focus{
  border-color:#03A4E2;
  box-shadow:0 0 0 2px rgba(3,164,226,0.2);
}

.composer button{
  background:#03A4E2;
  color:#fff;
  border:none;
  padding:12px 22px;
  font-weight:bold;
  cursor:pointer;
}

.composer button:hover{
  background:#0289bd;
}

.typing{
  display:flex;
  align-items:center;
  gap:6px;
}

.dot{
  width:7px;
  height:7px;
  border-radius:50%;
  background:#999;
  animation:blink 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes blink{
  0%{opacity:.3}
  50%{opacity:1}
  100%{opacity:.3}
}
</style>
</head>

<body>

<div class="page">
  <div class="chat">
    <div class="header">
      SOŠ IT Ostrovského – AI Sprievodca
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <input id="input" placeholder="Napíšte otázku..." autocomplete="off">
      <button id="sendBtn">Odoslať</button>
    </div>
  </div>
</div>

<script>
marked.setOptions({
  breaks:true,
  gfm:true
});

function renderMarkdown(text){
  return DOMPurify.sanitize(marked.parse(text || ""));
}

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const btn = document.getElementById("sendBtn");

function scrollBottom(){
  messages.scrollTop = messages.scrollHeight;
}

function addMessage(role, text, isTyping = false){
  const row = document.createElement("div");
  row.className = "row " + role;

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  if(isTyping){
    bubble.innerHTML = `
      <div class="typing">
        AI píše
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    `;
  } else {
    bubble.innerHTML = renderMarkdown(text);
  }

  row.appendChild(bubble);
  messages.appendChild(row);
  scrollBottom();
  return bubble;
}

addMessage("bot","Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 😊");

async function send(){
  const text = input.value.trim();
  if(!text) return;

  addMessage("user", text);
  input.value = "";

  const typingBubble = addMessage("bot", "", true);

  try{
    const res = await fetch("/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ message:text })
    });

    const data = await res.json();
    console.log("CHAT RESPONSE:", data);

    typingBubble.innerHTML = renderMarkdown(
      data.response || "Ospravedlňujem sa, odpoveď sa nepodarila načítať."
    );

  } catch(e){
    console.error("CHAT ERROR:", e);
    typingBubble.innerHTML = renderMarkdown(
      "Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu."
    );
  }

  scrollBottom();
}

btn.onclick = send;

input.addEventListener("keydown", e => {
  if(e.key === "Enter") send();
});
</script>

</body>
</html>
