<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>SOŠ IT Ostrovského – AI Sprievodca</title>

<style>

:root{
--main:#03A4E2;
--bg:rgba(255,255,255,0.92);
--bubble-ai:#f3f4f6;
--text:#111827;
--border:rgba(0,0,0,0.08);
--shadow:0 10px 30px rgba(0,0,0,0.12);
}

html,body{
height:100%;
width:100%;
margin:0;
padding:0;
background:transparent;
overflow:hidden;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}

.app{
height:100%;
width:100%;
display:flex;
}

.chat-shell{
height:100%;
width:100%;
display:flex;
flex-direction:column;
background:var(--bg);
border:1px solid var(--border);
box-shadow:var(--shadow);
}

.chat-header{
background:var(--main);
color:white;
font-weight:700;
text-align:center;
padding:14px;
letter-spacing:.2px;
}

.chat-body{
flex:1;
display:flex;
flex-direction:column;
padding:14px;
gap:10px;
}

.messages{
flex:1;
overflow:auto;
padding:10px;
background:rgba(255,255,255,0.55);
border:1px solid var(--border);
}

.msg{
display:flex;
margin:10px 0;
}

.msg.ai{
justify-content:flex-start;
}

.msg.user{
justify-content:flex-end;
}

.bubble{
max-width:90%;
padding:12px 14px;
font-size:15px;
line-height:1.35;
border:1px solid var(--border);
white-space:pre-wrap;
word-break:break-word;
}

.msg.ai .bubble{
background:var(--bubble-ai);
}

.msg.user .bubble{
background:var(--main);
color:white;
border-color:rgba(255,255,255,0.2);
}

.composer{
display:flex;
gap:10px;
padding:12px;
border-top:1px solid var(--border);
background:rgba(255,255,255,0.75);
}

.composer input{
flex:1;
height:44px;
padding:0 14px;
font-size:15px;
border:1px solid var(--border);
outline:none;
}

.composer input:focus{
border-color:var(--main);
box-shadow:0 0 0 2px rgba(3,164,226,0.25);
}

.composer button{
height:44px;
padding:0 18px;
font-weight:700;
font-size:15px;
color:white;
background:var(--main);
border:none;
cursor:pointer;
}

.composer button:disabled{
opacity:.6;
cursor:not-allowed;
}

</style>
</head>

<body>

<div class="app">

<div class="chat-shell">

<div class="chat-header">
SOŠ IT Ostrovského – AI Sprievodca
</div>

<div class="chat-body">

<div class="messages" id="messages">

<div class="msg ai">
<div class="bubble">
Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 🙂
</div>
</div>

</div>

</div>

<form class="composer" id="form">

<input id="input" type="text" placeholder="Napíšte otázku..." autocomplete="off">

<button id="send" type="submit">Odoslať</button>

</form>

</div>

</div>

<script>

const messages=document.getElementById("messages")
const form=document.getElementById("form")
const input=document.getElementById("input")
const send=document.getElementById("send")

function addMessage(text,type){

const row=document.createElement("div")
row.className="msg "+type

const bubble=document.createElement("div")
bubble.className="bubble"
bubble.textContent=text

row.appendChild(bubble)

messages.appendChild(row)

messages.scrollTop=messages.scrollHeight
}

async function sendMessage(text){

send.disabled=true
input.disabled=true

try{

const res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:text})
})

const data=await res.json()

const reply=data.reply || data.response || data.text || "Prepáč, momentálne to nefunguje."

addMessage(reply,"ai")

}catch(e){

addMessage("Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.","ai")

}

send.disabled=false
input.disabled=false
input.focus()

}

form.addEventListener("submit",function(e){

e.preventDefault()

const text=input.value.trim()

if(!text)return

addMessage(text,"user")

input.value=""

sendMessage(text)

})

window.onload=function(){
input.focus()
}

</script>

</body>
</html>
