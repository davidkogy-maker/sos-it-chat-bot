<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SOŠ IT Ostrovského – AI Sprievodca</title>

  <!-- Markdown render (bold, odrážky, číslované zoznamy) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- Sanitizácia HTML (bezpečnosť) -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <style>
    :root{
      --primary: #03A4E2;
      --primary-dark: #0289bd;
      --bg: #ffffff;
      --panel: #ffffff;
      --border: #e6e6e6;
      --soft: #f4f6f8;
      --text: #1f2a37;
      --muted: #6b7280;
      --shadow: 0 10px 30px rgba(0,0,0,.12);
      --radius: 0px;            /* kockované okraje (ako chceš) */
      --bubble-radius: 14px;
      --maxw: 1100px;           /* šírka chatu (celé okno vieš potom zmenšiť v 3D viste kontajnerom) */
      --maxh: 85vh;             /* výška chatu */
      --header-h: 62px;
      --composer-h: 92px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body{
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color: var(--text);
      background: transparent; /* dôležité pre iframe/webframe */
    }

    /* wrapper – nech je to pekne centrované, ale zároveň vieš kontajnerom v 3D viste škálovať */
    .page{
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .chat{
      width: min(var(--maxw), 100%);
      height: min(var(--maxh), 100vh);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Sticky header – drží sa stále hore pri scrolle */
    .header{
      position: sticky;
      top: 0;
      z-index: 50;
      height: var(--header-h);
      background: var(--primary);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      letter-spacing: .2px;
      padding: 0 14px;
      border-bottom: 1px solid rgba(255,255,255,.18);
      flex: 0 0 auto;
    }

    /* (Voliteľné) miesto pre tvoje X vpravo v headri – nech sa nestráca.
       Ak X nechceš, stačí zmazať celý button. */
    .header .close-btn{
      position: absolute;
      right: 10px;
      top: 10px;
      width: 42px;
      height: 42px;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(0,0,0,.18);
      color: #fff;
      font-size: 26px;
      line-height: 1;
      cursor: pointer;
      display: grid;
      place-items: center;
    }
    .header .close-btn:active{ transform: scale(.98); }

    /* Messages area – TOTO je ten scroll */
    .messages{
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 14px 18px;
      background: #fff;
    }

    /* pekný scroll */
    .messages::-webkit-scrollbar{ width: 10px; }
    .messages::-webkit-scrollbar-thumb{ background: #d6d6d6; border-radius: 10px; border: 2px solid #fff; }
    .messages::-webkit-scrollbar-track{ background: #fff; }

    .row{
      display: flex;
      margin: 10px 0;
    }
    .row.user{ justify-content: flex-end; }
    .row.bot{ justify-content: flex-start; }

    .bubble{
      max-width: 82%;
      padding: 12px 14px;
      border-radius: var(--bubble-radius);
      border: 1px solid var(--border);
      background: var(--soft);
      line-height: 1.35;
      font-size: 15.5px;
      white-space: normal;
    }
    .row.user .bubble{
      background: var(--primary);
      color: #fff;
      border-color: transparent;
    }

    /* Markdown vo vnútri bubliny */
    .bubble .md p{ margin: 0 0 10px; }
    .bubble .md p:last-child{ margin-bottom: 0; }
    .bubble .md ul, .bubble .md ol{ margin: 8px 0 0 20px; padding: 0; }
    .bubble .md li{ margin: 4px 0; }
    .row.user .bubble .md a{ color: #fff; text-decoration: underline; }

    /* Composer */
    .composer{
      flex: 0 0 auto;
      padding: 14px;
      border-top: 1px solid var(--border);
      background: #fff;
      height: var(--composer-h);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .composer input{
      flex: 1;
      height: 54px;
      padding: 0 16px;
      border: 1px solid #d9d9d9;
      outline: none;
      font-size: 16px;
    }
    .composer input:focus{
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(3,164,226,.20);
    }
    .composer button{
      height: 54px;
      min-width: 120px;
      border: 0;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      cursor: pointer;
    }
    .composer button:hover{ background: var(--primary-dark); }
    .composer button:disabled{
      opacity: .65;
      cursor: not-allowed;
    }

    /* Typing indicator */
    .typing{
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .dots{
      display: inline-flex;
      gap: 4px;
      align-items: center;
      height: 12px;
    }
    .dot{
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: #9aa4b2;
      opacity: .4;
      animation: blink 1.1s infinite;
    }
    .dot:nth-child(2){ animation-delay: .15s; }
    .dot:nth-child(3){ animation-delay: .30s; }

    @keyframes blink{
      0%, 100% { opacity: .35; transform: translateY(0); }
      50% { opacity: 1; transform: translateY(-2px); }
    }

    /* Mobil */
    @media (max-width: 520px){
      :root{
        --maxh: 92vh;
      }
      .bubble{ max-width: 92%; }
      .composer button{ min-width: 96px; }
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="chat" role="application" aria-label="Chat">
      <div class="header">
        SOŠ IT Ostrovského – AI Sprievodca

        <!-- Ak nechceš X v rámci webu, zmaž tento button -->
        <!-- (Pozn.: toto nevie “zavrieť” 3D Vistu popup na 100%,
             ale vie napr. poslať signál parentu cez postMessage ak si to napojíš.) -->
        <!-- <button class="close-btn" id="closeBtn" aria-label="Zavrieť">×</button> -->
      </div>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <input id="input" type="text" placeholder="Napíšte otázku..." autocomplete="off" />
        <button id="sendBtn">Odoslať</button>
      </div>
    </div>
  </div>

  <script>
    // --- Markdown nastavenie ---
    marked.setOptions({
      breaks: true,      // \n -> <br>
      gfm: true
    });

    function renderMarkdownSafe(text) {
      // model občas vráti null/undefined
      const raw = String(text ?? "");
      const html = marked.parse(raw);
      return DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
    }

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");

    function scrollToBottom() {
      // trochu “násilnejšie”, aby to vždy dobehlo aj pri dlhých odpovediach
      messagesEl.scrollTop = messagesEl.scrollHeight + 9999;
    }

    function addMessage(role, text, { isTyping=false } = {}) {
      const row = document.createElement("div");
      row.className = "row " + (role === "user" ? "user" : "bot");

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (isTyping) {
        bubble.innerHTML = `
          <div class="typing">
            <span>AI píše</span>
            <span class="dots" aria-hidden="true">
              <span class="dot"></span><span class="dot"></span><span class="dot"></span>
            </span>
          </div>
        `;
      } else {
        bubble.innerHTML = `<div class="md">${renderMarkdownSafe(text)}</div>`;
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollToBottom();
      return { row, bubble };
    }

    // Úvodná správa (ako si mal)
    addMessage("bot", "Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 😊");

    let isSending = false;

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isSending) return;

      isSending = true;
      sendBtn.disabled = true;

      addMessage("user", text);
      inputEl.value = "";

      // Typing indicator
      const typing = addMessage("bot", "", { isTyping: true });

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message: text })
        });

        // Ak server padne / 502 / 500, tak fallback
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }

        const data = await res.json();
        const reply = (data && (data.reply || data.response || data.text)) || "Prepáč, neviem teraz odpovedať.";

        // nahradiť typing bublinu odpoveďou
        typing.bubble.innerHTML = `<div class="md">${renderMarkdownSafe(reply)}</div>`;
        scrollToBottom();

      } catch (err) {
        // Jemná hláška (bez “API limit” textu)
        typing.bubble.innerHTML = `<div class="md">${renderMarkdownSafe("Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu (cca 10–20 sekúnd).")}</div>`;
        scrollToBottom();
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") sendMessage();
    });

    // Voliteľné: ak by si neskôr chcel poslať “close” signál parentu
    // const closeBtn = document.getElementById("closeBtn");
    // if (closeBtn) {
    //   closeBtn.addEventListener("click", () => {
    //     // toto len vyšle event – 3D Vista to musí vedieť zachytiť
    //     window.parent?.postMessage({ type: "SOS_IT_CHAT_CLOSE" }, "*");
    //   });
    // }
  </script>
</body>
</html>
