<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SOŠ IT AI Chat</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .chat-container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.96);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 35px rgba(0,0,0,0.25);
    }

    .header {
      background: #0a57c7;
      color: #fff;
      padding: 16px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }

    .msg {
      max-width: 85%;
      padding: 12px 14px;
      margin: 10px 0;
      border-radius: 14px;
      line-height: 1.4;
      word-wrap: break-word;
      font-size: 14px;
    }

    .msg.user {
      margin-left: auto;
      background: #0a57c7;
      color: #fff;
      border-bottom-right-radius: 6px;
    }

    .msg.bot {
      margin-right: auto;
      background: #eef1f5;
      color: #111;
      border-bottom-left-radius: 6px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      padding: 14px;
      border-top: 1px solid #e6e6e6;
      background: #fff;
    }

    #user-input {
      flex: 1;
      padding: 12px 14px;
      border: 1px solid #dcdcdc;
      border-radius: 22px;
      outline: none;
      font-size: 14px;
    }

    button {
      background: #0a57c7;
      color: #fff;
      border: none;
      padding: 12px 16px;
      border-radius: 22px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .loading {
      opacity: 0.85;
      font-style: italic;
    }

    /* Scrollbar jemne decentná */
    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.2);
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    SOŠ IT Ostrovského - AI Sprievodca
  </div>

  <div id="messages"></div>

  <div class="input-row">
    <input id="user-input" type="text" placeholder="Napíšte otázku..." 
      onkeydown="if(event.key==='Enter'){sendMessage();}" />
    <button id="send-btn" onclick="sendMessage()">Odoslať</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  const history = [];

  appendMessage("Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 🙂", "bot");

  function escapeHtml(str) {
    return str
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function formatMessage(text) {
    let t = escapeHtml(text);
    t = t.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    t = t.replaceAll("\n", "<br>");
    return t;
  }

  function appendMessage(text, side) {
    const div = document.createElement('div');
    div.className = `msg ${side}`;
    div.innerHTML = formatMessage(text);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    appendMessage(text, "user");
    history.push({ role: "user", text });

    inputEl.value = "";
    sendBtn.disabled = true;

    const loadingDiv = document.createElement('div');
    loadingDiv.className = 'msg bot loading';
    loadingDiv.innerText = 'AI premýšľa...';
    loadingDiv.id = 'temp-loading';
    messagesEl.appendChild(loadingDiv);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const response = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });

      document.getElementById('temp-loading')?.remove();
      const data = await response.json();

      const botText = data.response || "Server nevrátil odpoveď.";
      appendMessage(botText, "bot");
      history.push({ role: "model", text: botText });

    } catch (error) {
      document.getElementById('temp-loading')?.remove();
      appendMessage("Chyba pripojenia. Skús to prosím znova.", "bot");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }
</script>

</body>
</html>
