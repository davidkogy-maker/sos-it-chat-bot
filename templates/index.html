<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SOŠ IT Ostrovského – AI Sprievodca</title>
  <style>
    :root{
      --blue:#0b5bd3;
      --blue2:#0a54c7;
      --bg:#ffffff;
      --panel:#f3f4f6;
      --bubble:#e9edf3;
      --text:#0f172a;
      --muted:#64748b;
      --radius:22px;
      --shadow:0 12px 30px rgba(0,0,0,.12);
      --maxW: 980px; /* ak chceš aby na PC nebolo extrémne široké */
    }

    /* FULLSCREEN voči rodičovi (iframe / container v 3DVista) */
    html, body {
      width:100%;
      height:100%;
      margin:0;
      padding:0;
      background: transparent; /* nech si to rieši 3DVista container */
      overflow:hidden;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
    }

    /* Root wrapper vždy 100% */
    #app{
      width:100%;
      height:100%;
      display:flex;
      align-items:stretch;
      justify-content:center;
    }

    /* Shell vyplní celú plochu, ale vie mať max šírku */
    .shell{
      width:100%;
      height:100%;
      max-width: var(--maxW);
      display:flex;
      padding: 0; /* nech je to “edge-to-edge” v containery */
      box-sizing:border-box;
    }

    /* Karta chatu vyplní celý shell */
    .chat{
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(6px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    /* Header */
    .header{
      flex: 0 0 auto;
      background: linear-gradient(180deg, var(--blue), var(--blue2));
      color:#fff;
      font-weight:700;
      text-align:center;
      padding: 16px 14px;
      letter-spacing:.2px;
      font-size: 16px;
    }

    /* Messages area = zvyšok priestoru */
    .messages{
      flex: 1 1 auto;
      min-height:0; /* dôležité aby scroll fungoval v flex */
      padding: 16px;
      overflow:auto;
      background: rgba(243,244,246,.75);
    }

    .row{
      display:flex;
      margin: 10px 0;
    }
    .row.user{ justify-content:flex-end; }
    .row.bot{ justify-content:flex-start; }

    .bubble{
      max-width: 88%;
      padding: 12px 14px;
      border-radius: 16px;
      line-height: 1.35;
      font-size: 15px;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }
    .row.user .bubble{
      background: var(--blue);
      color:#fff;
      border-top-right-radius: 10px;
    }
    .row.bot .bubble{
      background: #ffffff;
      color: var(--text);
      border-top-left-radius: 10px;
      border: 1px solid rgba(15,23,42,.06);
    }

    .hint{
      color: var(--muted);
      font-size: 12px;
      margin-top: 6px;
    }

    /* Input bar */
    .composer{
      flex: 0 0 auto;
      display:flex;
      gap: 12px;
      padding: 14px;
      background: rgba(255,255,255,.9);
      border-top: 1px solid rgba(15,23,42,.08);
    }

    .input{
      flex: 1 1 auto;
      border: 1px solid rgba(15,23,42,.14);
      border-radius: 999px;
      padding: 12px 14px;
      font-size: 15px;
      outline:none;
      background:#fff;
    }
    .input:focus{
      border-color: rgba(11,91,211,.55);
      box-shadow: 0 0 0 3px rgba(11,91,211,.15);
    }

    .btn{
      flex: 0 0 auto;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      font-size: 15px;
      cursor:pointer;
      background: var(--blue);
      color:#fff;
    }
    .btn:disabled{
      opacity:.65;
      cursor:not-allowed;
    }

    /* Keď je tvoj 3DVista container menší/na výšku: jemne zmenšíme paddingy */
    @media (max-height: 520px){
      .header{ padding: 12px 12px; font-size: 15px; }
      .messages{ padding: 12px; }
      .composer{ padding: 10px; gap: 10px; }
      .input{ padding: 10px 12px; }
      .btn{ padding: 10px 14px; }
    }

    /* Ak chceš aby karta bola úplne “edge-to-edge” bez radiusu v malom containery */
    @media (max-width: 520px){
      .chat{ border-radius: 18px; }
      .bubble{ max-width: 92%; }
    }
  </style>
</head>

<body>
  <div id="app">
    <div class="shell">
      <div class="chat" role="application" aria-label="AI chat">
        <div class="header">SOŠ IT Ostrovského – AI Sprievodca</div>

        <div id="messages" class="messages" aria-live="polite">
          <div class="row bot">
            <div class="bubble">
              Som AI sprievodca SOŠ IT. Spýtaj sa ma na odbory, prijímačky alebo informácie o škole 😊
            </div>
          </div>
        </div>

        <form id="composer" class="composer" autocomplete="off">
          <input id="input" class="input" type="text" placeholder="Napíšte otázku..." />
          <button id="send" class="btn" type="submit">Odoslať</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const formEl = document.getElementById('composer');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addMessage(text, who) {
      const row = document.createElement('div');
      row.className = 'row ' + (who === 'user' ? 'user' : 'bot');

      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = text;

      row.appendChild(bubble);
      messagesEl.appendChild(row);

      // scroll dole
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function setBusy(busy) {
      sendBtn.disabled = busy;
      inputEl.disabled = busy;
    }

    async function sendMessage(q) {
      setBusy(true);
      addMessage(q, 'user');

      // placeholder odpoveď
      const placeholder = addMessage('...', 'bot');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: q })
        });

        // ak backend vráti 200 aj pri chybe, ošetrujeme aj to
        const data = await res.json().catch(() => ({}));

        if (!res.ok || !data || typeof data.reply !== 'string' || !data.reply.trim()) {
          throw new Error('bad_response');
        }

        placeholder.textContent = data.reply;
      } catch (e) {
        // “neprezrádzaj API limit” – iba ľudská hláška
        placeholder.textContent = 'Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.';
      } finally {
        setBusy(false);
        inputEl.value = '';
        inputEl.focus();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    formEl.addEventListener('submit', (ev) => {
      ev.preventDefault();
      const q = (inputEl.value || '').trim();
      if (!q) return;
      sendMessage(q);
    });
  </script>
</body>
</html>
