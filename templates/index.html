<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SOŠ IT Ostrovského – AI Sprievodca</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>

  <style>
    :root{
      --primary:#03A4E2;
      --primary-dark:#0289bd;
      --border:#d9d9d9;
      --bg:#efefef;
      --bot:#e9ecef;
      --text:#1f2937;
      --white:#ffffff;
      --chip-bg:#ffffff;
      --chip-border:#cfd8df;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      height:100%;
      font-family:Arial, Helvetica, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    body{
      display:flex;
      flex-direction:column;
    }

    .header{
      background:var(--primary);
      color:white;
      text-align:center;
      padding:22px 16px;
      font-size:18px;
      font-weight:700;
      position:sticky;
      top:0;
      z-index:10;
    }

    .chat-wrap{
      flex:1;
      display:flex;
      flex-direction:column;
      min-height:0;
    }

    .messages{
      flex:1;
      overflow-y:auto;
      padding:20px 16px 18px;
    }

    .row{
      display:flex;
      margin:14px 0;
      width:100%;
    }

    .row.user{
      justify-content:flex-end;
    }

    .row.bot{
      justify-content:flex-start;
    }

    .row.bot.welcome{
      justify-content:flex-start;
    }

    .bubble{
      max-width:min(78%, 1100px);
      padding:18px 22px;
      border-radius:18px;
      border:1px solid var(--border);
      line-height:1.6;
      font-size:17px;
      word-wrap:break-word;
      overflow-wrap:anywhere;
      white-space:normal;
    }

    .row.bot .bubble{
      background:var(--bot);
      color:var(--text);
    }

    .row.user .bubble{
      background:var(--primary);
      color:var(--white);
      border:none;
    }

    .row.bot.welcome .bubble{
      max-width:min(92%, 720px);
    }

    .bubble p{
      margin:0 0 14px;
    }

    .bubble p:last-child{
      margin-bottom:0;
    }

    .bubble ul, .bubble ol{
      margin:8px 0 14px 24px;
    }

    .bubble li{
      margin:4px 0;
    }

    .bubble a{
      color:#005bbb;
      text-decoration:underline;
    }

    .row.user .bubble a{
      color:#ffffff;
    }

    .quick-questions-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:10px 16px 14px;
      background:transparent;
    }

    .quick-title{
      width:100%;
      max-width:760px;
      font-size:14px;
      color:#5b6570;
      margin-bottom:10px;
      font-weight:600;
    }

    .quick-questions{
      width:100%;
      max-width:760px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .quick-btn{
      border:1px solid var(--chip-border);
      background:var(--chip-bg);
      color:var(--text);
      padding:10px 14px;
      font-size:14px;
      border-radius:999px;
      cursor:pointer;
      transition:all 0.18s ease;
    }

    .quick-btn:hover{
      border-color:var(--primary);
      color:var(--primary);
      transform:translateY(-1px);
    }

    .quick-btn:disabled{
      opacity:0.65;
      cursor:not-allowed;
      transform:none;
    }

    .composer{
      display:flex;
      gap:12px;
      padding:14px 12px;
      border-top:1px solid #d7d7d7;
      background:#f7f7f7;
    }

    .composer input{
      flex:1;
      min-width:0;
      padding:16px 18px;
      font-size:17px;
      border:1px solid #c9c9c9;
      outline:none;
      background:white;
    }

    .composer input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(3,164,226,0.18);
    }

    .composer button{
      border:none;
      background:var(--primary);
      color:white;
      padding:0 24px;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      min-width:120px;
    }

    .composer button:hover{
      background:var(--primary-dark);
    }

    .composer button:disabled{
      opacity:0.7;
      cursor:not-allowed;
    }

    .typing{
      display:inline-flex;
      align-items:center;
      gap:6px;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#8c8c8c;
      animation:blink 1s infinite;
    }

    .dot:nth-child(2){
      animation-delay:0.15s;
    }

    .dot:nth-child(3){
      animation-delay:0.3s;
    }

    @keyframes blink{
      0%{opacity:.25}
      50%{opacity:1}
      100%{opacity:.25}
    }

    @media (max-width: 768px){
      .header{
        font-size:16px;
        padding:18px 12px;
      }

      .messages{
        padding:14px 10px 14px;
      }

      .bubble{
        max-width:88%;
        font-size:16px;
        padding:14px 16px;
      }

      .quick-questions-wrap{
        padding:10px 10px 12px;
      }

      .quick-btn{
        font-size:13px;
        padding:9px 12px;
      }

      .composer{
        padding:10px;
      }

      .composer input{
        font-size:16px;
        padding:14px;
      }

      .composer button{
        min-width:98px;
        padding:0 16px;
      }
    }
  </style>
</head>
<body>
  <div class="header">SOŠ IT Ostrovského – AI Sprievodca</div>

  <div class="chat-wrap">
    <div class="messages" id="messages"></div>

    <div class="quick-questions-wrap">
      <div class="quick-title">Skús sa opýtať napríklad:</div>
      <div class="quick-questions">
        <button class="quick-btn" data-question="Aké študijné odbory ponúka škola?">Aké sú odbory?</button>
        <button class="quick-btn" data-question="Ako prebiehajú prijímačky na školu?">Ako prebiehajú prijímačky?</button>
        <button class="quick-btn" data-question="Kde nájdem jedálny lístok?">Kde nájdem jedálny lístok?</button>
        <button class="quick-btn" data-question="Ako sa prihlásim na EduPage?">Ako sa prihlásim na EduPage?</button>
        <button class="quick-btn" data-question="Aké sú kontakty na školu?">Aké sú kontakty?</button>
      </div>
    </div>

    <div class="composer">
      <input id="input" type="text" placeholder="Napíšte otázku..." autocomplete="off">
      <button id="sendBtn">Odoslať</button>
    </div>
  </div>

  <script>
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("input");
    const sendBtn = document.getElementById("sendBtn");
    const quickButtons = document.querySelectorAll(".quick-btn");

    let history = [];

    function renderMarkdown(text){
      const raw = marked.parse(text || "");
      return DOMPurify.sanitize(raw);
    }

    function scrollBottom(){
      setTimeout(() => {
        messagesEl.scrollTo({
          top: messagesEl.scrollHeight,
          behavior: "smooth"
        });
      }, 50);
    }

    function addMessage(role, text, isTyping = false, isWelcome = false){
      const row = document.createElement("div");
      row.className = `row ${role}${isWelcome ? " welcome" : ""}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if(isTyping){
        bubble.innerHTML = `
          <div class="typing">
            <span>AI píše</span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
        `;
      } else {
        bubble.innerHTML = renderMarkdown(text);
      }

      row.appendChild(bubble);
      messagesEl.appendChild(row);
      scrollBottom();
      return bubble;
    }

    function pushHistory(role, text){
      history.push({ role, text });
      if(history.length > 12){
        history = history.slice(-12);
      }
    }

    async function sendMessage(customText = null){
      const text = customText || inputEl.value.trim();
      if(!text) return;

      addMessage("user", text);
      pushHistory("user", text);

      inputEl.value = "";
      inputEl.disabled = true;
      sendBtn.disabled = true;
      quickButtons.forEach(btn => btn.disabled = true);

      const typingBubble = addMessage("bot", "", true);

      try{
        const res = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            message: text,
            history: history
          })
        });

        const data = await res.json();
        const reply = data.response || "Ospravedlňujem sa, odpoveď sa nepodarila načítať.";

        typingBubble.innerHTML = renderMarkdown(reply);
        pushHistory("model", reply);

        scrollBottom();

      } catch (err){
        typingBubble.innerHTML = renderMarkdown("Momentálne je veľa ľudí naraz. Skús to prosím o chvíľu.");
        scrollBottom();
      } finally {
        inputEl.disabled = false;
        sendBtn.disabled = false;
        quickButtons.forEach(btn => btn.disabled = false);
        inputEl.focus();
        scrollBottom();
      }
    }

    sendBtn.addEventListener("click", () => sendMessage());

    inputEl.addEventListener("keydown", (e) => {
      if(e.key === "Enter"){
        sendMessage();
      }
    });

    quickButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        const question = btn.getAttribute("data-question");
        sendMessage(question);
      });
    });

    addMessage(
      "bot",
      `Som AI sprievodca **SOŠ IT Ostrovského** 🙂

Môžeš sa ma opýtať napríklad:
- **aké sú odbory**
- **ako prebiehajú prijímačky**
- **kde nájdeš informácie na EduPage**
- **aké sú kontakty**

Rád ti pomôžem 🙂`,
      false,
      true
    );
  </script>
</body>
</html>
